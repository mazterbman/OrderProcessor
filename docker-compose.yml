services:
  postgres:
    image: postgres:16
    container_name: orderprocessor-postgres
    environment:
      POSTGRES_DB: orderprocessor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - orderprocessor-pgdata:/var/lib/postgresql/data

volumes:
  orderprocessor-pgdata: